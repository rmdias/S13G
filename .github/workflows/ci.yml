name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        run: dotnet test tests/Unit/UnitTests.csproj --no-build -c Release --logger "console;verbosity=minimal"

      - name: Integration tests
        run: dotnet test tests/Integration/IntegrationTests.csproj --no-build -c Release --logger "console;verbosity=minimal"
